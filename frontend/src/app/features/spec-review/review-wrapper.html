<div class="header">
  <h1>Specification Review</h1>
  <div>
    @if (!isPreviewMode()) {
    <button class="approve-btn" (click)="approveSpec()">Approve Specification</button>
    } @else {
    <button class="approve-btn" (click)="generateCode()">Generate Code</button>
    }
    <button class="preview-btn" (click)="togglePreview()">{{ isPreviewMode() ? 'Edit' : 'Preview' }}</button>
  </div>
</div>

<div class="container">
  @if (!isPreviewMode()) {
  <app-left-panel [selectedSection]="selectedSection" (sectionSelected)="onSectionSelect($event)">
  </app-left-panel>
  <app-right-panel [selectedSection]="selectedSection">
  </app-right-panel>
  } @else {
  <app-left-panel [files]="files()" [selectedFile]="selectedFile" (fileSelected)="onFileSelect($event)">
  </app-left-panel>
  <app-right-panel [selectedFile]="selectedFile" [mdText]="getMdText(selectedFile)" [isPreviewMode]="true">
  </app-right-panel>
  }
  <app-chatbox> </app-chatbox>
</div>
