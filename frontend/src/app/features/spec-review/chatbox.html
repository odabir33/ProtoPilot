<div class="sidebar">
  <div class="chat-section">
    <div class="chat-history">
      @for(msg of chatHistory(); track msg.id){
        @if(msg.type != "user"){
          <div class="system-msg">{{msg.text}}</div>
        }@else{
          <div class="user-msg">
            <div class="user-msg-content">{{msg.text}} </div>
          </div>
        }
      }
    </div>
    <div class="bottom-section">
      <textarea [(ngModel)]="chatMessage" placeholder="Describe the changes in natural language..."
      rows="5"></textarea>
      <button (click)="sendChatMessage()" [disabled]="sendBtnDisabled()">{{sendBtnText()}}</button>
    </div>
  </div>
</div>
