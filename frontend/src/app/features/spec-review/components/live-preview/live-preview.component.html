<div class="preview-container">
  <div class="preview-header">
    <h2>Live Preview</h2>
    <button (click)="generatePreview()" [disabled]="loading" class="refresh-btn">
      {{ loading ? 'Generating...' : 'Refresh' }}
    </button>
  </div>

  <div class="preview-content">
    <ng-container *ngIf="loading">
      <div class="loading">
        <p>Generating preview...</p>
      </div>
    </ng-container>

    <ng-container *ngIf="error">
      <div class="error">
        <p>{{ error }}</p>
      </div>
    </ng-container>

    <ng-container *ngIf="projectData && !loading && !error">
      <!-- Form to embed Stackblitz -->
      <form 
        #previewForm 
        method="POST" 
        action="https://stackblitz.com/run" 
        target="stackblitz-embed"
        style="display: none;">
        <textarea name="project[files][package.json]" style="display: none;">{{ projectData.packageJson }}</textarea>
        <textarea name="project[files][angular.json]" style="display: none;">{{ projectData.angularJson }}</textarea>
        <textarea name="project[files][tsconfig.json]" style="display: none;">{{ projectData.tsconfigJson }}</textarea>
        <textarea name="project[files][src/main.ts]" style="display: none;">{{ projectData.mainTs }}</textarea>
        <ng-container *ngFor="let file of projectData.generatedFiles">
          <textarea [name]="'project[files][' + file.path + ']'" style="display: none;">{{ file.content }}</textarea>
        </ng-container>
        <input type="hidden" name="project[title]" value="Angular App Preview" />
        <input type="hidden" name="project[description]" value="Generated Angular application preview" />
        <input type="hidden" name="project[template]" value="angular-cli" />
      </form>
      
      <iframe
        name="stackblitz-embed"
        class="preview-iframe"
        title="Angular App Preview"
      ></iframe>
    </ng-container>
  </div>
</div>
